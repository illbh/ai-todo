<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- 文字コードとスマホ表示の設定 -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODOアプリ</title>
  <!-- スタイルシートの読み込み -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1 class="app-title">TODO</h1>

    <!-- TODO入力エリア -->
    <div class="input-area">
      <input
        type="text"
        id="todo-input"
        class="todo-input"
        placeholder="新しいタスクを入力..."
        maxlength="100"
      />
      <button id="add-btn" class="add-btn">追加</button>
    </div>

    <!-- フィルターボタン -->
    <div class="filter-area">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="done">完了済み</button>
    </div>

    <!-- TODOリストの表示エリア -->
    <ul id="todo-list" class="todo-list"></ul>

    <!-- タスク数の表示 -->
    <div class="footer">
      <span id="task-count">0件のタスク</span>
      <button id="clear-done-btn" class="clear-btn">完了済みを削除</button>
    </div>
  </div>

  <!-- JavaScriptの読み込み（bodyの最後に置くことでHTMLが先に読み込まれる） -->
  <script src="app.js"></script>
</body>
</html>
