<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- 文字コードとスマホ表示の設定 -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODOアプリ</title>

  <!-- PWA: ホーム画面追加・テーマカラーの設定 -->
  <meta name="theme-color" content="#4a90d9" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="TODO" />

  <!-- PWA: マニフェストファイルの読み込み -->
  <link rel="manifest" href="manifest.json" />

  <!-- スタイルシートの読み込み -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1 class="app-title">TODO</h1>

    <!-- TODO入力エリア -->
    <div class="input-area">
      <input
        type="text"
        id="todo-input"
        class="todo-input"
        placeholder="新しいタスクを入力..."
        maxlength="100"
      />
      <button id="add-btn" class="add-btn">追加</button>
    </div>

    <!-- フィルターボタン -->
    <div class="filter-area">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="done">完了済み</button>
    </div>

    <!-- TODOリストの表示エリア -->
    <ul id="todo-list" class="todo-list"></ul>

    <!-- タスク数の表示 -->
    <div class="footer">
      <span id="task-count">0件のタスク</span>
      <button id="clear-done-btn" class="clear-btn">完了済みを削除</button>
    </div>
  </div>

  <!-- JavaScriptの読み込み（bodyの最後に置くことでHTMLが先に読み込まれる） -->
  <script src="app.js"></script>

  <!-- PWA: Service Workerの登録 -->
  <script>
    // Service WorkerはHTTPS または localhost でのみ動作します
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js')
          .then(function(registration) {
            console.log('[SW] 登録成功:', registration.scope);
          })
          .catch(function(error) {
            console.log('[SW] 登録失敗:', error);
          });
      });
    }
  </script>
</body>
</html>
